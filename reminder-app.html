<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REMIND — Smart Reminder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a40;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --accent3: #5cf0c8;
    --text: #eeeef8;
    --muted: #7070a0;
    --warn: #fcb35c;
    --danger: #fc5c5c;
    --success: #5cfc8a;
    --glow: rgba(124,92,252,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,92,252,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 50% at 85% 80%, rgba(252,92,125,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 30% at 60% 50%, rgba(92,240,200,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }

  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span { font-weight: 400; opacity: 0.5; font-size: 14px; display: block; letter-spacing: 3px; margin-top: -4px; background: none; -webkit-text-fill-color: var(--muted); }

  .time-display {
    text-align: right;
  }

  #clock {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  #date-display {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.3s;
  }

  .stat-pill .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-all { background: var(--accent); }
  .dot-today { background: var(--accent3); }
  .dot-done { background: var(--success); }
  .dot-overdue { background: var(--danger); }

  .stat-pill strong { font-family: 'Syne', sans-serif; font-weight: 700; }

  /* Add Form */
  .add-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .add-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }

  .add-card:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow), 0 8px 40px rgba(0,0,0,0.4);
  }

  .add-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: center;
    margin-bottom: 12px;
  }

  .form-row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 12px;
    align-items: center;
  }

  input[type="text"], input[type="datetime-local"], select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  select option { background: var(--surface2); }

  textarea { resize: none; min-height: 70px; }

  .btn {
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 10px 20px;
    transition: all 0.2s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9b5de5);
    color: #fff;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(124,92,252,0.4);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 16px;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  /* Reminders list */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .reminders-list { display: flex; flex-direction: column; gap: 12px; }

  .reminder-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 24px 1fr auto;
    gap: 14px;
    align-items: flex-start;
    transition: all 0.3s;
    animation: slideIn 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .reminder-card:hover {
    border-color: var(--border);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    transform: translateY(-1px);
  }

  .reminder-card.priority-high::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--danger);
    border-radius: 3px 0 0 3px;
  }

  .reminder-card.priority-medium::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--warn);
    border-radius: 3px 0 0 3px;
  }

  .reminder-card.priority-low::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent3);
    border-radius: 3px 0 0 3px;
  }

  .reminder-card.done {
    opacity: 0.5;
  }

  .reminder-card.done .reminder-title {
    text-decoration: line-through;
    color: var(--muted);
  }

  .reminder-card.overdue:not(.done) {
    border-color: rgba(252,92,92,0.3);
    background: rgba(252,92,92,0.04);
  }

  /* Checkbox */
  .check-wrap { padding-top: 2px; }

  .custom-check {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .custom-check:hover { border-color: var(--accent); }
  .custom-check.checked { background: var(--accent); border-color: var(--accent); }
  .custom-check svg { opacity: 0; transition: opacity 0.2s; }
  .custom-check.checked svg { opacity: 1; }

  .reminder-body {}

  .reminder-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .reminder-note {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.5;
  }

  .reminder-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .meta-chip {
    background: var(--surface2);
    border-radius: 6px;
    font-size: 11px;
    padding: 3px 8px;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .meta-chip.time { color: var(--accent3); }
  .meta-chip.overdue { color: var(--danger); background: rgba(252,92,92,0.1); }
  .meta-chip.today { color: var(--accent3); background: rgba(92,240,200,0.1); }
  .meta-chip.cat { color: var(--accent); }

  .reminder-actions {
    display: flex;
    gap: 6px;
    align-items: flex-start;
    padding-top: 1px;
  }

  .icon-btn {
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    padding: 6px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px; height: 32px;
  }

  .icon-btn:hover { color: var(--text); border-color: var(--border); }
  .icon-btn.speak:hover { color: var(--accent3); border-color: var(--accent3); }
  .icon-btn.del:hover { color: var(--danger); border-color: var(--danger); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 8px; color: var(--text); opacity: 0.6; }
  .empty-state p { font-size: 14px; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 12px 24px;
    font-size: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Alarm modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
  }

  .modal-overlay.open .modal { transform: scale(1); }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .modal-icon {
    font-size: 52px;
    margin-bottom: 16px;
    animation: ring 0.5s ease infinite alternate;
  }

  @keyframes ring {
    from { transform: rotate(-12deg); }
    to { transform: rotate(12deg); }
  }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .modal p { color: var(--muted); font-size: 15px; margin-bottom: 8px; }
  .modal-note { color: var(--text); font-size: 13px; margin-bottom: 24px; font-style: italic; }

  .modal-actions { display: flex; gap: 10px; justify-content: center; }

  /* Speaking indicator */
  .speaking-wave {
    display: inline-flex;
    gap: 3px;
    align-items: center;
    margin-left: 8px;
  }

  .speaking-wave span {
    display: inline-block;
    width: 3px;
    height: 12px;
    background: var(--accent3);
    border-radius: 2px;
    animation: wave 0.8s ease infinite;
  }

  .speaking-wave span:nth-child(2) { animation-delay: 0.15s; height: 18px; }
  .speaking-wave span:nth-child(3) { animation-delay: 0.3s; height: 10px; }
  .speaking-wave span:nth-child(4) { animation-delay: 0.45s; height: 16px; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  /* Progress ring for next reminder */
  .next-up {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .next-up-icon { font-size: 28px; }

  .next-up-info { flex: 1; }
  .next-up-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
  .next-up-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
  .next-up-time { font-size: 12px; color: var(--accent3); margin-top: 2px; }

  .voice-btn {
    background: linear-gradient(135deg, var(--accent3), #3de8b0);
    border: none;
    border-radius: 50px;
    color: #0a0a0f;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 16px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .voice-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(92,240,200,0.3); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Pulse animation for overdue */
  @keyframes pulseBorder {
    0%, 100% { border-color: rgba(252,92,92,0.3); }
    50% { border-color: rgba(252,92,92,0.7); }
  }

  .reminder-card.overdue:not(.done) {
    animation: pulseBorder 2s ease infinite, slideIn 0.3s ease;
  }

  .badge {
    background: var(--danger);
    border-radius: 50px;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    margin-left: 8px;
    font-family: 'Syne', sans-serif;
  }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .form-row-2 { grid-template-columns: 1fr 1fr; }
    .stats { overflow-x: auto; }
    .stat-pill { flex-shrink: 0; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">
      REMIND
      <span>SMART REMINDER</span>
    </div>
    <div class="time-display">
      <div id="clock">00:00:00</div>
      <div id="date-display">Loading...</div>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-pill"><span class="dot dot-all"></span><strong id="stat-total">0</strong> Total</div>
    <div class="stat-pill"><span class="dot dot-today"></span><strong id="stat-today">0</strong> Today</div>
    <div class="stat-pill"><span class="dot dot-done"></span><strong id="stat-done">0</strong> Done</div>
    <div class="stat-pill"><span class="dot dot-overdue"></span><strong id="stat-overdue">0</strong> Overdue</div>
  </div>

  <!-- Next up -->
  <div class="next-up" id="next-up-bar" style="display:none">
    <div class="next-up-icon">⏰</div>
    <div class="next-up-info">
      <div class="next-up-label">Next Reminder</div>
      <div class="next-up-title" id="next-title">—</div>
      <div class="next-up-time" id="next-time">—</div>
    </div>
    <button class="voice-btn" id="speak-next-btn" onclick="speakNextReminder()">
      🔊 Speak
    </button>
  </div>

  <!-- Add form -->
  <div class="add-card">
    <div class="add-title">＋ New Reminder</div>
    <div class="form-row">
      <input type="text" id="inp-title" placeholder="What do you need to be reminded about?" />
      <select id="inp-priority">
        <option value="low">🟢 Low</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
      <select id="inp-category">
        <option value="📋 General">📋 General</option>
        <option value="💼 Work">💼 Work</option>
        <option value="🏠 Home">🏠 Home</option>
        <option value="❤️ Health">❤️ Health</option>
        <option value="🎓 Study">🎓 Study</option>
        <option value="💰 Finance">💰 Finance</option>
        <option value="🎉 Event">🎉 Event</option>
      </select>
    </div>
    <div class="form-row-2">
      <input type="datetime-local" id="inp-datetime" />
      <textarea id="inp-note" placeholder="Optional note..." rows="2"></textarea>
      <button class="btn btn-primary" onclick="addReminder()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('today', this)">Today</button>
    <button class="filter-btn" onclick="setFilter('upcoming', this)">Upcoming</button>
    <button class="filter-btn" onclick="setFilter('overdue', this)">Overdue <span class="badge" id="overdue-badge">0</span></button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    <button class="filter-btn" onclick="setFilter('work', this)">💼 Work</button>
    <button class="filter-btn" onclick="setFilter('health', this)">❤️ Health</button>
  </div>

  <!-- List -->
  <div class="section-header">
    <div class="section-title" id="list-heading">All Reminders</div>
    <button class="btn btn-ghost" onclick="speakAll()" style="font-size:12px;padding:7px 14px;">🔊 Read All</button>
  </div>
  <div class="reminders-list" id="reminders-list"></div>
</div>

<!-- Alarm Modal -->
<div class="modal-overlay" id="alarm-modal">
  <div class="modal">
    <div class="modal-icon">🔔</div>
    <h2 id="alarm-title">Reminder!</h2>
    <p id="alarm-time">Now</p>
    <div class="modal-note" id="alarm-note"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="snooze()">😴 Snooze 5 min</button>
      <button class="btn btn-primary" onclick="dismissAlarm()">✅ Dismiss</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast">✅ Done!</div>

<script>
// State
let reminders = JSON.parse(localStorage.getItem('remind_data') || '[]');
let currentFilter = 'all';
let alarmInterval = null;
let activeAlarmId = null;
let isSpeaking = false;
let speechQueue = [];

// Init
updateClock();
setInterval(updateClock, 1000);
setInterval(checkAlarms, 15000);
checkAlarms();
render();

// Set default datetime to now + 1 hour
const d = new Date(); d.setHours(d.getHours() + 1, 0, 0, 0);
document.getElementById('inp-datetime').value = d.toISOString().slice(0, 16);

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('date-display').textContent = now.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

// Add reminder
function addReminder() {
  const title = document.getElementById('inp-title').value.trim();
  const dt = document.getElementById('inp-datetime').value;
  const priority = document.getElementById('inp-priority').value;
  const category = document.getElementById('inp-category').value;
  const note = document.getElementById('inp-note').value.trim();

  if (!title) { showToast('⚠️ Please enter a title!'); return; }
  if (!dt) { showToast('⚠️ Please set date & time!'); return; }

  const reminder = {
    id: Date.now(),
    title,
    datetime: dt,
    priority,
    category,
    note,
    done: false,
    snoozed: false
  };

  reminders.unshift(reminder);
  save();
  render();
  showToast('🎉 Reminder added!');

  // Speak confirmation
  speak(`New reminder set: ${title} at ${formatDateTime(dt)}`);

  // Reset form
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-note').value = '';
  const nd = new Date(); nd.setHours(nd.getHours() + 1, 0, 0, 0);
  document.getElementById('inp-datetime').value = nd.toISOString().slice(0, 16);
}

// Save
function save() { localStorage.setItem('remind_data', JSON.stringify(reminders)); }

// Render
function render() {
  const list = document.getElementById('reminders-list');
  const now = new Date();
  const today = new Date(now); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);

  // Filter
  let filtered = reminders.filter(r => {
    const rt = new Date(r.datetime);
    if (currentFilter === 'today') return rt >= today && rt < tomorrow;
    if (currentFilter === 'upcoming') return rt > now && !r.done;
    if (currentFilter === 'overdue') return rt < now && !r.done;
    if (currentFilter === 'done') return r.done;
    if (currentFilter === 'work') return r.category.includes('Work');
    if (currentFilter === 'health') return r.category.includes('Health');
    return true;
  });

  // Stats
  const total = reminders.length;
  const todayCount = reminders.filter(r => { const rt = new Date(r.datetime); return rt >= today && rt < tomorrow; }).length;
  const doneCount = reminders.filter(r => r.done).length;
  const overdueCount = reminders.filter(r => new Date(r.datetime) < now && !r.done).length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-today').textContent = todayCount;
  document.getElementById('stat-done').textContent = doneCount;
  document.getElementById('stat-overdue').textContent = overdueCount;
  document.getElementById('overdue-badge').textContent = overdueCount;

  // Next reminder
  const upcoming = reminders.filter(r => !r.done && new Date(r.datetime) > now)
    .sort((a,b) => new Date(a.datetime) - new Date(b.datetime));

  const nextBar = document.getElementById('next-up-bar');
  if (upcoming.length > 0) {
    nextBar.style.display = 'flex';
    document.getElementById('next-title').textContent = upcoming[0].title;
    document.getElementById('next-time').textContent = `In ${timeUntil(upcoming[0].datetime)} · ${formatDateTime(upcoming[0].datetime)}`;
  } else {
    nextBar.style.display = 'none';
  }

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🗓️</div><h3>Nothing here</h3><p>Add a reminder above to get started</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(r => {
    const rt = new Date(r.datetime);
    const isOverdue = rt < now && !r.done;
    const isToday = rt >= today && rt < tomorrow;
    const timeChip = isOverdue
      ? `<span class="meta-chip overdue">⚠️ ${timeAgo(r.datetime)}</span>`
      : isToday
      ? `<span class="meta-chip today">📅 Today · ${rt.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'})}</span>`
      : `<span class="meta-chip time">⏰ ${formatDateTime(r.datetime)}</span>`;

    return `
    <div class="reminder-card priority-${r.priority}${r.done ? ' done' : ''}${isOverdue ? ' overdue' : ''}" id="card-${r.id}">
      <div class="check-wrap">
        <div class="custom-check${r.done ? ' checked' : ''}" onclick="toggleDone(${r.id})">
          <svg width="12" height="12" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </div>
      <div class="reminder-body">
        <div class="reminder-title">${escHtml(r.title)}</div>
        ${r.note ? `<div class="reminder-note">${escHtml(r.note)}</div>` : ''}
        <div class="reminder-meta">
          ${timeChip}
          <span class="meta-chip cat">${r.category}</span>
          <span class="meta-chip">${priorityLabel(r.priority)}</span>
        </div>
      </div>
      <div class="reminder-actions">
        <button class="icon-btn speak" title="Read aloud" onclick="speakReminder(${r.id})">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
        <button class="icon-btn del" title="Delete" onclick="deleteReminder(${r.id})">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

// Toggle done
function toggleDone(id) {
  const r = reminders.find(x => x.id === id);
  if (!r) return;
  r.done = !r.done;
  save();
  render();
  if (r.done) {
    showToast('✅ Marked as done!');
    speak(`${r.title} — marked as done. Great job!`);
  }
}

// Delete
function deleteReminder(id) {
  if (!confirm('Delete this reminder?')) return;
  reminders = reminders.filter(x => x.id !== id);
  save();
  render();
  showToast('🗑️ Deleted!');
}

// Filter
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const labels = { all: 'All Reminders', today: "Today's Reminders", upcoming: 'Upcoming', overdue: 'Overdue', done: 'Completed', work: 'Work Reminders', health: 'Health Reminders' };
  document.getElementById('list-heading').textContent = labels[f] || f;
  render();
}

// Speech
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.95;
  u.pitch = 1.05;
  u.volume = 1;

  // Pick a decent voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.name.includes('Google') && v.lang.startsWith('en'))
    || voices.find(v => v.lang.startsWith('en-IN'))
    || voices.find(v => v.lang.startsWith('en'));
  if (preferred) u.voice = preferred;

  window.speechSynthesis.speak(u);
}

function speakReminder(id) {
  const r = reminders.find(x => x.id === id);
  if (!r) return;
  const now = new Date();
  const rt = new Date(r.datetime);
  const isOverdue = rt < now && !r.done;
  const status = r.done ? 'Completed.' : isOverdue ? 'Overdue!' : `Scheduled for ${formatDateTime(r.datetime)}.`;
  const text = `Reminder: ${r.title}. ${r.note ? 'Note: ' + r.note + '.' : ''} Priority: ${r.priority}. ${status}`;
  speak(text);
  showToast('🔊 Speaking...');
}

function speakNextReminder() {
  const now = new Date();
  const upcoming = reminders.filter(r => !r.done && new Date(r.datetime) > now)
    .sort((a,b) => new Date(a.datetime) - new Date(b.datetime));
  if (upcoming.length === 0) { speak('No upcoming reminders.'); return; }
  const r = upcoming[0];
  speak(`Your next reminder is: ${r.title}, in ${timeUntil(r.datetime)}.${r.note ? ' Note: ' + r.note : ''}`);
  showToast('🔊 Speaking next reminder...');
}

function speakAll() {
  const now = new Date();
  const today = new Date(now); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);

  let active = reminders.filter(r => !r.done);
  if (active.length === 0) { speak('You have no pending reminders.'); return; }

  const overdue = active.filter(r => new Date(r.datetime) < now);
  const todayR = active.filter(r => { const rt = new Date(r.datetime); return rt >= now && rt < tomorrow; });
  const upcoming = active.filter(r => new Date(r.datetime) >= tomorrow);

  let msg = `You have ${active.length} pending reminder${active.length > 1 ? 's' : ''}. `;
  if (overdue.length) msg += `${overdue.length} overdue: ${overdue.map(r => r.title).join(', ')}. `;
  if (todayR.length) msg += `${todayR.length} due today: ${todayR.map(r => r.title).join(', ')}. `;
  if (upcoming.length) msg += `${upcoming.length} upcoming: ${upcoming.map(r => r.title).join(', ')}.`;

  speak(msg);
  showToast('🔊 Reading all reminders...');
}

// Alarms
function checkAlarms() {
  const now = new Date();
  reminders.forEach(r => {
    if (r.done || r.alarmShown) return;
    const rt = new Date(r.datetime);
    const diff = Math.abs(now - rt) / 1000;
    if (diff <= 30 && rt <= now) {
      r.alarmShown = true;
      save();
      triggerAlarm(r);
    }
  });
  render();
}

function triggerAlarm(r) {
  activeAlarmId = r.id;
  document.getElementById('alarm-title').textContent = r.title;
  document.getElementById('alarm-time').textContent = formatDateTime(r.datetime);
  document.getElementById('alarm-note').textContent = r.note || '';
  document.getElementById('alarm-modal').classList.add('open');
  speak(`Reminder alert! ${r.title}. ${r.note ? r.note : ''}`);
}

function dismissAlarm() {
  document.getElementById('alarm-modal').classList.remove('open');
  if (activeAlarmId) toggleDone(activeAlarmId);
  activeAlarmId = null;
}

function snooze() {
  document.getElementById('alarm-modal').classList.remove('open');
  if (!activeAlarmId) return;
  const r = reminders.find(x => x.id === activeAlarmId);
  if (r) {
    const newTime = new Date(new Date(r.datetime).getTime() + 5 * 60000);
    r.datetime = newTime.toISOString().slice(0, 16);
    r.alarmShown = false;
    save(); render();
    speak(`${r.title} snoozed for 5 minutes.`);
    showToast('😴 Snoozed for 5 minutes');
  }
  activeAlarmId = null;
}

// Helpers
function formatDateTime(dt) {
  return new Date(dt).toLocaleString('en-IN', {
    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
  });
}

function timeUntil(dt) {
  const diff = new Date(dt) - new Date();
  if (diff < 0) return 'overdue';
  const m = Math.floor(diff / 60000);
  if (m < 60) return `${m} min`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ${m % 60}m`;
  return `${Math.floor(h / 24)}d ${h % 24}h`;
}

function timeAgo(dt) {
  const diff = new Date() - new Date(dt);
  const m = Math.floor(diff / 60000);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function priorityLabel(p) {
  return { low: '🟢 Low', medium: '🟡 Medium', high: '🔴 High' }[p] || p;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Load voices on first interaction
window.speechSynthesis.onvoiceschanged = () => {};

// Add a few demo reminders if empty
if (reminders.length === 0) {
  const now = new Date();
  const add = (t, minOffset, note, priority, cat) => {
    const dt = new Date(now.getTime() + minOffset * 60000);
    reminders.push({ id: Date.now() + Math.random(), title: t, datetime: dt.toISOString().slice(0,16), note, priority, category: cat, done: false });
  };
  add('Team standup meeting', 30, 'Don\'t forget to share updates', 'high', '💼 Work');
  add('Drink water 💧', 60, 'Stay hydrated!', 'low', '❤️ Health');
  add('Review project proposal', 120, 'Check the docs in Drive', 'medium', '💼 Work');
  add('Evening walk 🚶', 300, '30 minutes around the park', 'medium', '❤️ Health');
  save();
}

render();
</script>
